[[package]]
name = "xeltofab"
version = "0.1.0"
source = { editable = "." }
dependencies = [
    { name = "click" },
    { name = "marimo" },
    { name = "matplotlib" },
    { name = "numpy" },
    { name = "plotly" },
    { name = "pydantic" },
    { name = "pyfqmr" },
    { name = "scikit-image" },
    { name = "scipy" },
    { name = "trimesh" },
]

[package.optional-dependencies]
all = [
    { name = "gpytoolbox" },
    { name = "h5py" },
    { name = "pymeshlab" },
    { name = "pyvista" },
]
all-formats = [
    { name = "h5py" },
    { name = "pyvista" },
]
hdf5 = [
    { name = "h5py" },
]
mesh-quality = [
    { name = "gpytoolbox" },
    { name = "pymeshlab" },
]
vtk = [
    { name = "pyvista" },
]

[package.dev-dependencies]
dev = [
    { name = "marimo" },
    { name = "pytest" },
    { name = "ruff" },
]

[package.metadata]
requires-dist = [
    { name = "click", specifier = ">=8.3.1" },
    { name = "gpytoolbox", marker = "extra == 'all'", specifier = ">=0.3.0" },
    { name = "gpytoolbox", marker = "extra == 'mesh-quality'", specifier = ">=0.3.0" },
    { name = "h5py", marker = "extra == 'all'", specifier = ">=3.10" },
    { name = "h5py", marker = "extra == 'all-formats'", specifier = ">=3.10" },
    { name = "h5py", marker = "extra == 'hdf5'", specifier = ">=3.10" },
    { name = "marimo", specifier = ">=0.20.4" },
    { name = "matplotlib", specifier = ">=3.10.8" },
    { name = "numpy" },
    { name = "plotly", specifier = ">=6.6.0" },
    { name = "pydantic", specifier = ">=2.12.5" },
    { name = "pyfqmr", specifier = ">=0.5.0" },
    { name = "pymeshlab", marker = "extra == 'all'", specifier = ">=2023.12" },
    { name = "pymeshlab", marker = "extra == 'mesh-quality'", specifier = ">=2023.12" },
    { name = "pyvista", marker = "extra == 'all'", specifier = ">=0.43" },
    { name = "pyvista", marker = "extra == 'all-formats'", specifier = ">=0.43" },
    { name = "pyvista", marker = "extra == 'vtk'", specifier = ">=0.43" },
